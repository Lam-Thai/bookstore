services:
  - type: web
    name: bookstore
    runtime: dotnet
    plan: free
    autoDeploy: true
    buildCommand: dotnet publish -c Release -o out
    startCommand: dotnet out/Bookstore.dll
    envVars:
      - key: ASPNETCORE_URLS
        value: http://0.0.0.0:$PORT
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
